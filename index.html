<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Telegram</title>

<style>
body{
    margin:0;
    padding:0;
    background:#f1f1f1;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
}

button{
    background:#0088cc;
    color:white;
    border:none;
    padding:18px 40px;
    font-size:24px;
    border-radius:12px;
    cursor:pointer;
}
</style>
</head>

<body>

<button onclick="startOpen()">
JOIN TELEGRAM
</button>

<script>

function smallPopup(link){

    const popup = window.open(
        link,
        '_blank',
        'width=320,height=600'
    );

}

function startOpen(){

    // Telegram
    smallPopup("https://t.me/yourtelegramgroup");

    // Delay দিয়ে popup
    setTimeout(() => {
        smallPopup("https://1winpbu.com/");
    }, 500);

    setTimeout(() => {
        smallPopup("https://1winpbu.com/");
    }, 1000);

    setTimeout(() => {
        smallPopup("https://1winpbu.com/");
    }, 1500);

    setTimeout(() => {
        smallPopup("https://1winpbu.com/");
    }, 2000);

    setTimeout(() => {
        smallPopup("https://1winpbu.com/");
    }, 2500);

}

</script>

</body>
</html>
