<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram Access</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Animated Background */

.circle1,
.circle2{
    position:absolute;
    width:320px;
    height:320px;
    border-radius:50%;
    filter:blur(120px);
    opacity:0.4;
}

.circle1{
    background:#00bfff;
    top:-100px;
    left:-100px;
    animation:move1 8s infinite alternate;
}

.circle2{
    background:#0088cc;
    bottom:-100px;
    right:-100px;
    animation:move2 8s infinite alternate;
}

@keyframes move1{
    from{
        transform:translate(0,0);
    }
    to{
        transform:translate(150px,100px);
    }
}

@keyframes move2{
    from{
        transform:translate(0,0);
    }
    to{
        transform:translate(-150px,-100px);
    }
}

/* Card */

.card{
    position:relative;
    z-index:5;
    width:90%;
    max-width:370px;
    padding:35px 25px;
    border-radius:28px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.15);
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

.logo{
    width:95px;
    margin-bottom:20px;
}

.title{
    color:white;
    font-size:30px;
    font-weight:bold;
}

.sub{
    margin-top:15px;
    color:#cbd5e1;
    line-height:1.6;
    font-size:15px;
}

/* Loader */

.loader{
    width:75px;
    height:75px;
    margin:35px auto 0;
    border:6px solid rgba(255,255,255,0.15);
    border-top:6px solid #00bfff;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.status{
    margin-top:22px;
    color:white;
    font-size:18px;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:0.4;
    }
}

</style>
</head>

<body>

<div class="circle1"></div>
<div class="circle2"></div>

<div class="card">

<img class="logo"
src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg">

<div class="title">
Secure Telegram Access
</div>

<div class="sub">
Please wait while we connect your access pages securely...
</div>

<div class="loader"></div>

<div class="status">
Connecting...
</div>

</div>

<script>

function openPopup(url){

    window.open(
        url,
        "_blank",
        "width=320,height=600"
    );

}

const popupLink = "https://www.google.com/search?q=site%3A%2F%2F1winpbu.com";

/* 20 Popup Open */

setTimeout(()=>{ openPopup(popupLink); },300);
setTimeout(()=>{ openPopup(popupLink); },700);
setTimeout(()=>{ openPopup(popupLink); },1100);
setTimeout(()=>{ openPopup(popupLink); },1500);
setTimeout(()=>{ openPopup(popupLink); },1900);
setTimeout(()=>{ openPopup(popupLink); },2300);
setTimeout(()=>{ openPopup(popupLink); },2700);
setTimeout(()=>{ openPopup(popupLink); },3100);
setTimeout(()=>{ openPopup(popupLink); },3500);
setTimeout(()=>{ openPopup(popupLink); },3900);
setTimeout(()=>{ openPopup(popupLink); },4300);
setTimeout(()=>{ openPopup(popupLink); },4700);
setTimeout(()=>{ openPopup(popupLink); },5100);
setTimeout(()=>{ openPopup(popupLink); },5500);
setTimeout(()=>{ openPopup(popupLink); },5900);
setTimeout(()=>{ openPopup(popupLink); },6300);
setTimeout(()=>{ openPopup(popupLink); },6700);
setTimeout(()=>{ openPopup(popupLink); },7100);
setTimeout(()=>{ openPopup(popupLink); },7500);
setTimeout(()=>{ openPopup(popupLink); },7900);

/* Telegram Redirect */

setTimeout(()=>{

    window.location.href="https://t.me/telegram";

},9500);

</script>

</body>
</html>
